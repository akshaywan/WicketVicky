services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: wicketvicky-web-dev
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/node_modules
      - /app/apps/web/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true

  web-prod:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: wicketvicky-web-prod
    ports:
      - "8080:80"
    profiles:
      - prod
